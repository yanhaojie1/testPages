<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            color: #222;
            font-size: 26px;
            margin-bottom: 16px;
        }
        p {
            color: #555;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #3671e9;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #285bc4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎访问本页面</h1>
        <p>这是一个极简原创HTML页面，所有代码自行编写，未使用网络图片、付费字体、版权素材，不存在侵权风险，可自由修改、自用、部署。</p>
        <a class="btn" href="#">点击了解更多</a>
    </div>
</body>
</html>
